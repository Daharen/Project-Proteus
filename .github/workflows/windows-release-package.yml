name: windows-release-package

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-package:
    runs-on: windows-2022
    env:
      VCPKG_ROOT: ${{ github.workspace }}\\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:VCPKG_ROOT")) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
          }
          & "$env:VCPKG_ROOT\\bootstrap-vcpkg.bat"

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT\\vcpkg.exe" install sqlite3:$env:VCPKG_DEFAULT_TRIPLET openssl:$env:VCPKG_DEFAULT_TRIPLET

      - name: Verify vcpkg packages
        shell: pwsh
        run: |
          Write-Host "VCPKG_ROOT=$env:VCPKG_ROOT"
          $installed = & "$env:VCPKG_ROOT\\vcpkg.exe" list
          $installed
          if (-not ($installed | Select-String -Pattern "^sqlite3:x64-windows")) {
            throw "sqlite3:x64-windows not found in vcpkg installed package list"
          }

      - name: Configure (VS2022 x64)
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\\scripts\\buildsystems\\vcpkg.cmake" -DVCPKG_TARGET_TRIPLET="$env:VCPKG_DEFAULT_TRIPLET"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Run tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Run self test harness
        run: .\build\Release\proteus.exe --serve --dev --self_test

      - name: Compute short SHA
        shell: pwsh
        run: |
          $short = "${{ github.sha }}".Substring(0,8)
          "SHORT_SHA=$short" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package runtime
        shell: pwsh
        run: |
          $pkgDir = "package"
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Copy-Item "build/Release/proteus.exe" "$pkgDir/proteus.exe"
          if (Test-Path "build/Release/*.dll") {
            Copy-Item "build/Release/*.dll" $pkgDir
          }
          Copy-Item "run_server.bat" "$pkgDir/run_server.bat"
          Copy-Item "README_run.txt" "$pkgDir/README_run.txt"
          Copy-Item "web" "$pkgDir/web" -Recurse
          Compress-Archive -Path "$pkgDir/*" -DestinationPath "proteus-windows-release.zip" -Force

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: proteus-${{ github.ref_name }}-${{ env.SHORT_SHA }}
          path: proteus-windows-release.zip
