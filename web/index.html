<!doctype html>
<html>
<head><meta charset="utf-8" /><title>Proteus v15 Funnel</title><link rel="stylesheet" href="/style.css" /></head>
<body>
  <h1>Proteus v15 Funnel</h1>
  <label>LLM Mode
    <select id="llmMode"><option>OFFLINE</option><option>ONLINE_CAPTURE</option></select>
  </label>
  <div>
    <button class="modeBtn" data-mode="class">Class</button>
    <button class="modeBtn" data-mode="skill">Skill</button>
    <button class="modeBtn" data-mode="dialogue">Dialogue</button>
  </div>
  <h3 id="stepTitle">Step: Choose mode</h3>
  <textarea id="text" rows="3" placeholder="Type search text or 'Other' idea"></textarea><br/>
  <button id="searchBtn">Search</button>
  <button id="otherBtn">Other (bootstrap)</button>
  <pre id="status"></pre>
  <div id="results"></div>
  <script src="/app.js"></script>
</body>
</html>
